[package]
name = "agentx-native"
version = "0.1.0"
edition = "2021"

[lib]
name = "agentx_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.21", features = ["extension-module"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
jsonrpc-core = "18.0"
uuid = { version = "1.0", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = "0.3"
once_cell = "1.19"
lancedb = "0.15"
arrow-array = "53"
arrow-schema = "53"
arrow-ipc = "53"
futures = "0.3"
tiktoken-rs = "0.6"
tokenizers = "0.19"
