name: AJA Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build_wheels:
    name: Build Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/aja-native/target/
          key: cargo-${{ matrix.os }}-${{ hashFiles('packages/aja-native/Cargo.toml', 'packages/aja-native/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Install Maturin
        run: pip install maturin

      - name: Build Unified Package
        run: maturin build --release --out dist

      - name: Upload Built Wheels
        uses: actions/upload-artifact@v4
        with:
          name: aja-wheels-${{ matrix.os }}
          path: dist/*.whl

  validate_wheels:
    name: Runtime Integration (${{ matrix.os }})
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Download compiled wheels
        uses: actions/download-artifact@v4
        with:
          name: aja-wheels-${{ matrix.os }}
          path: dist

      - name: Install Unified Package & Dev Dependencies
        shell: bash
        run: |
          WHEEL=$(ls dist/aja-*.whl | grep -v aja_native | head -n 1)
          pip install "${WHEEL}[all]"
          pip install pytest anyio psutil pywinpty

      - name: Diagnostic Verification (doctor checks)
        run: aja doctor --ci

      - name: Run Full Test Suite
        run: pytest tests/python -x --tb=short

  release:
    name: Create GitHub Release
    needs: validate_wheels
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aja-*.whl
          generate_release_notes: true
