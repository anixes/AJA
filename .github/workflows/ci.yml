name: AJA Runtime CI/CD

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

permissions:
  contents: read

jobs:
  # Crate & Extension Wheels Compilation
  build_wheels:
    name: Build Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/aja-native/target/
          key: cargo-${{ matrix.os }}-${{ hashFiles('packages/aja-native/Cargo.toml', 'packages/aja-native/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.os }}-

      - name: Install Maturin
        run: pip install maturin pytest anyio

      - name: Build Unified Package
        run: maturin build --release --out dist

      - name: Upload Built Wheels
        uses: actions/upload-artifact@v4
        with:
          name: aja-wheels-${{ matrix.os }}
          path: dist/*.whl

  # Hardened Runtime Smoke Tests
  test_runtime:
    name: Runtime Integration (${{ matrix.os }})
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]  # v0.1.0 official support only — ABI3 loads on 3.13 but not officially tested yet

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Download compiled wheels
        uses: actions/download-artifact@v4
        with:
          name: aja-wheels-${{ matrix.os }}
          path: dist

      - name: Install Unified Package & Dev Dependencies
        run: |
          pip install --find-links=dist "aja[all]"
          pip install pytest anyio psutil

      - name: Diagnostic Verification (doctor checks)
        run: aja doctor --ci

      - name: Run Full Test Suite
        run: pytest tests/python
